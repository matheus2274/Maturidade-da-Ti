name: Deploy backend to Fly.io

on:
  push:
    branches:
      - main
    paths:
      - 'MaturidadeTI_Run/**'
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - 'fly.toml'
      - 'README_DEPLOY.md'
      - '.github/workflows/deploy-backend-flyio.yml'
  workflow_dispatch:

concurrency:
  group: fly-backend
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FLY_APP_NAME: maturidade-ti-backend
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify backend build
        run: mvn -q -DskipTests package

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --config fly.toml --app "$FLY_APP_NAME"

      - name: Show Fly status
        run: flyctl status --app "$FLY_APP_NAME" || true

      - name: Fetch Fly logs
        run: flyctl logs --app "$FLY_APP_NAME" --no-tail || true

      - name: Verify public API
        run: |
          for attempt in 1 2 3 4 5; do
            echo "Verifying backend (attempt $attempt)..."
            if curl --ipv4 --fail --silent --show-error --max-time 20 "http://$FLY_APP_NAME.fly.dev/api/v1/questoes/listar"; then
              echo "Backend is reachable."
              exit 0
            fi
            sleep 15
          done
          echo "Backend did not respond after multiple attempts."
          exit 1
