name: Deploy backend to Fly.io (template)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy to Fly
    runs-on: ubuntu-latest
    if: secrets.FLY_API_TOKEN != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions@v1

      - name: Deploy with flyctl
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # Requires a pre-existing fly app and fly.toml in the repo.
          # Create app locally with `fly launch` and add FLY_API_TOKEN to repo secrets.
          flyctl deploy --config fly.toml --remote-only
