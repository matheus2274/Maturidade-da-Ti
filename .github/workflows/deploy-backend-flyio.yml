name: Deploy backend to Fly.io (template)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy to Fly
    runs-on: ubuntu-latest
    if: secrets.FLY_API_TOKEN != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions@v1

      - name: Ensure Fly app and deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -e
          cd backend
          # Ensure flyctl can use the token from env
          echo "Using fly API token (masked)"
          # Create app if it does not exist
          if ! flyctl apps list | grep -q maturidade-ti-backend; then
            flyctl apps create maturidade-ti-backend || true
          fi
          # Deploy remotely using the Dockerfile in backend/
          flyctl deploy --config fly.toml --remote-only -a maturidade-ti-backend
