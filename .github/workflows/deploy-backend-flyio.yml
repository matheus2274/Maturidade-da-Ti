name: Deploy backend to Fly.io (template)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Fly
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flyctl
        run: |
          curl -L https://fly.io/install.sh | sh

      - name: Ensure Fly app and deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -e
          echo "flyctl version:"
          flyctl version
          echo "Using fly API token (masked)"
          if ! flyctl apps list | grep -q maturidade-ti-backend; then
            flyctl apps create maturidade-ti-backend || true
          fi
          flyctl deploy --config fly.toml -a maturidade-ti-backend
