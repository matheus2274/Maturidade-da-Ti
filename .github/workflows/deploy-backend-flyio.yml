name: Deploy backend to Fly.io (template)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Fly
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "export PATH=\"$HOME/.fly/bin:$PATH\"" >> $GITHUB_ENV

      - name: Ensure Fly app and deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLYCTL_ACCESS_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -e
          FLYCTL="$HOME/.fly/bin/flyctl"
          echo "flyctl path: $FLYCTL"
          ls -l "$HOME/.fly/bin"
          echo "flyctl version:"
          "$FLYCTL" version
          echo "Using fly API token (masked)"
          "$FLYCTL" auth token "$FLY_API_TOKEN"
          if ! "$FLYCTL" apps list | grep -q maturidade-ti-backend; then
            "$FLYCTL" apps create maturidade-ti-backend || true
          fi
          "$FLYCTL" deploy --config fly.toml -a maturidade-ti-backend
