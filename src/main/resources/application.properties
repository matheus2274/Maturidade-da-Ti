spring.application.name=maturidade-ti-backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/maturidade_ti;MODE=MySQL;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always
spring.sql.init.continue-on-error=true
spring.main.allow-circular-references=true

server.port=8080
server.servlet.context-path=/api/v1

jwt.secret=${JWT_SECRET:maturidade-ti-secret-key-super-segura-2026-desenvolvimento}
jwt.expiration=${JWT_EXPIRATION:86400000}

logging.level.root=INFO
logging.level.com.maturidadeti=DEBUG
